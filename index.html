<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #ffdde1, #ee9ca7);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            z-index: 2;
        }

        h1 {
            color: #e74c3c;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: #e74c3c;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #c0392b;
        }

        .heart {
            position: absolute;
            color: rgba(255,255,255,0.7);
            font-size: 20px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        .popup {
            position: fixed;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>I'm Really Sorry ❤️</h1>
    <p id="message"></p>
    <button onclick="showPopup()">Click me 💌</button>
</div>

<div class="popup" id="popup">
    You mean everything to me ❤️<br><br>
    I love you more than words can ever explain.
</div>

<script>
    // Typing effect
    const text = "I know I hurt you, and I'm truly sorry.\nYou mean the world to me, and I never want to lose you.\nI promise to be better, for us. ❤️";
    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            document.getElementById("message").innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
            i++;
            setTimeout(typeWriter, 40);
        }
    }
    typeWriter();

    // Popup
    function showPopup() {
        const popup = document.getElementById("popup");
        popup.style.display = "block";
        popup.style.top = "50%";
        popup.style.left = "50%";
        popup.style.transform = "translate(-50%, -50%)";

        setTimeout(() => {
            popup.style.display = "none";
        }, 3000);
    }

    // Floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
